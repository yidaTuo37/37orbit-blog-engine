<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#040914" />
    <meta name="description" content="37ORBIT — 个人作品集 / Selected Works" />
    <title>37ORBIT | Selected Works</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- 蓝调暗色作品集主题变量；其余交给 Tailwind (index.css) -->
    <style>
      :root {
        --accent: #ef8d69;
        --c-frames: #9ed0cf;
        --c-writing: #c6b8df;
        --bg-dark: #040914;
        --surface: #121c2b;
        --surface-2: #142033;
        --border-warm: rgba(202, 220, 244, 0.14);
        --text-warm: #eef3f8;
        --text-muted: #9aa9bd;
        --text-dim: #7f8da3;
      }
      body {
        margin: 0;
        overflow-x: hidden;
        background-color: var(--bg-dark);
        color: var(--text-warm);
        font-family: "Inter", sans-serif;
      }
      h1,
      h2,
      h3,
      .orbit-font {
        font-family: "Space Grotesk", sans-serif;
      }
      .serif-font {
        font-family: "Noto Serif SC", Georgia, "Songti SC", serif;
      }
      .mono-font {
        font-family: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
      }
      ::selection {
        background: var(--accent);
        color: #fff;
      }
      /* 隐藏滚动条但保留滚动能力 */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script type="module" src="/index.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
